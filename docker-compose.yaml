services:
  web:
    build: ./backend
    container_name: nokia-webem-generator
    ports:
      # 5000 is often taken on macOS (AirPlay); use 5001 on host
      - "5001:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/generated:/app/generated
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: nokia-webem-frontend
    ports:
      - "3000:80"
    depends_on:
      - web
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: nokia-webem-ngrok
    profiles: ["share"]
    command: http frontend:80 --log=stdout
    env_file:
      - ./backend/.env
    ports:
      # ngrok inspector — open http://localhost:4040 to see the public URL
      - "4040:4040"
    depends_on:
      - frontend
    restart: unless-stopped
